<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White rounded background -->
  <rect width="100" height="100" rx="22" fill="#ffffff"/>
  <!-- Body (light red, rounded corners match the rect) -->
  <path fill="#EF5350" d="M20,0 L80,0 Q100,0 100,20 L100,80 Q100,100 80,100 L20,100 Q0,100 0,80 L0,20 Q0,0 20,0 Z"/>
  <!-- Bottom section (dark red, clipped) -->
  <clipPath id="c">
    <path d="M0,50 L100,50 L100,80 Q100,100 80,100 L20,100 Q0,100 0,80 Z"/>
  </clipPath>
  <path fill="#C62828" d="M0,50 L100,50 L100,100 L0,100 Z" clip-path="url(#c)"/>
  <!-- Middle band (cyan) -->
  <path fill="#29B6F6" d="M0,44 L100,44 L100,56 L0,56 Z"/>
  <!-- Band gloss -->
  <path fill="rgba(255,255,255,0.25)" d="M0,44 L100,44 L100,50 L0,50 Z"/>
  <!-- Lens outer -->
  <circle fill="#B71C1C" cx="28" cy="25" r="13"/>
  <!-- Lens middle -->
  <circle fill="#EF9A9A" cx="28" cy="25" r="9"/>
  <!-- Lens inner -->
  <circle fill="#E3F2FD" cx="28" cy="25" r="6"/>
  <!-- Lens highlight -->
  <circle fill="rgba(255,255,255,0.67)" cx="24" cy="21" r="2.5"/>
  <!-- Status dots -->
  <circle fill="#FF5252" cx="66" cy="16" r="3.5"/>
  <circle fill="#FFD740" cx="76" cy="16" r="3.5"/>
  <circle fill="#69F0AE" cx="86" cy="16" r="3.5"/>
  <!-- Play triangle -->
  <path fill="#FFD740" d="M18,70 L27,76 L18,82 Z"/>
  <!-- Bottom line -->
  <path fill="#B71C1C" d="M33,79 L82,79 L82,83 L33,83 Z"/>
</svg>
